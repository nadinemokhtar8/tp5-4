services:
  app:
    build:
      context: .
    container_name: tp_symfony_app
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    depends_on:
      database:
        condition: service_healthy

  database:
    image: mysql:8.0
    container_name: tp_symfony_db
    environment:
      MYSQL_DATABASE: symfony_db
      MYSQL_USER: app
      MYSQL_PASSWORD: app
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uapp", "-papp"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db_data:
